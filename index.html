<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amar Furniture CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AF CRM">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f1a;
  --surface: #16162a;
  --surface2: #1e1e35;
  --surface3: #252540;
  --border: #2a2a4a;
  --accent: #f0a500;
  --text: #e8e8f0;
  --text2: #9090b0;
  --text3: #606080;
  --stage-new: #3b82f6;
  --stage-contacted: #8b5cf6;
  --stage-visit: #06b6d4;
  --stage-quote: #f59e0b;
  --stage-nego: #f97316;
  --stage-won: #22c55e;
  --stage-lost: #6b7280;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

/* ── AUTH SCREEN ── */
#authScreen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  background: radial-gradient(ellipse at 50% 0%, #1e1a0e 0%, #0f0f1a 70%);
}
.auth-logo {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:28px;
  letter-spacing:-1px;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:10px;
}
.auth-logo span { color:var(--accent); }
.auth-sub { font-size:13px; color:var(--text3); margin-bottom:40px; }
.auth-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 24px;
  width:100%;
  max-width:380px;
}
.auth-title { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; margin-bottom:20px; }
.auth-error {
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  color:#fca5a5;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:14px;
  display:none;
}
.auth-error.show { display:block; }

/* ── APP SCREEN ── */
#appScreen { display:none; flex-direction:column; min-height:100vh; }
#appScreen.visible { display:flex; }

/* HEADER */
.header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  height:56px; flex-shrink:0;
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; display:flex; align-items:center; gap:8px; }
.logo-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
.logo span { color:var(--accent); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
.header-right { display:flex; align-items:center; gap:8px; }
.icon-btn {
  background:var(--surface2); border:none; color:var(--text2);
  width:34px; height:34px; border-radius:10px;
  cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.icon-btn:hover { background:var(--surface3); color:var(--text); }

/* OFFLINE BANNER */
.offline-banner {
  background:#7c3aed;
  color:#fff;
  text-align:center;
  padding:6px 12px;
  font-size:12px;
  font-weight:500;
  display:none;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex-shrink:0;
}
.offline-banner.show { display:flex; }
.sync-badge {
  background:rgba(255,255,255,.25);
  border-radius:10px;
  padding:2px 8px;
  font-size:11px;
}

/* STATS */
.stats-bar {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stat-item { background:var(--surface); padding:12px 8px; text-align:center; }
.stat-num { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--accent); line-height:1; }
.stat-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:3px; }

/* FILTER STRIP */
.filter-strip {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 12px;
  display:flex; gap:7px;
  overflow-x:auto; scrollbar-width:none;
  flex-shrink:0;
}
.filter-strip::-webkit-scrollbar { display:none; }
.filter-chip {
  display:flex; align-items:center; gap:5px;
  padding:5px 11px; border-radius:20px;
  border:1px solid var(--border);
  background:transparent; color:var(--text2);
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; white-space:nowrap; transition:all .2s;
}
.filter-chip.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.chip-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

/* SEARCH */
.search-wrap { padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.search-input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:9px 13px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s;
}
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:var(--accent); }

/* LEADS */
.leads-list { padding:12px 14px; display:flex; flex-direction:column; gap:9px; flex:1; }
.lead-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:13px; padding:13px;
  cursor:pointer; transition:all .2s;
  animation:slideIn .25s ease;
  position:relative; overflow:hidden;
}
.lead-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--stage-color,var(--accent));
  border-radius:13px 0 0 13px;
}
.lead-card:hover { border-color:var(--stage-color,var(--accent)); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,.3); }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.lead-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:7px; }
.lead-name { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; }
.lead-phone { font-size:12px; color:var(--text2); margin-top:2px; }
.stage-badge {
  padding:3px 9px; border-radius:20px;
  font-size:11px; font-weight:600; white-space:nowrap;
  background:var(--stage-color,var(--accent)); color:#fff;
}
.stage-badge.won { color:#000; }
.lead-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
.meta-tag { display:flex; align-items:center; gap:3px; padding:2px 7px; background:var(--surface2); border-radius:5px; font-size:11px; color:var(--text2); }
.lead-note { font-size:12px; color:var(--text3); margin-top:7px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.lead-footer { display:flex; justify-content:space-between; align-items:center; margin-top:7px; }
.lead-date { font-size:11px; color:var(--text3); }
.offline-dot { width:6px; height:6px; border-radius:50%; background:#7c3aed; title:'Pending sync'; }

/* EMPTY */
.empty-state { text-align:center; padding:50px 20px; color:var(--text3); }
.empty-icon { font-size:44px; margin-bottom:10px; }
.empty-title { font-family:'Syne',sans-serif; font-size:17px; color:var(--text2); margin-bottom:5px; }
.empty-sub { font-size:13px; }

/* FAB */
.fab {
  position:fixed; bottom:22px; right:18px;
  width:54px; height:54px;
  background:var(--accent); border:none; border-radius:50%;
  color:#000; font-size:26px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(240,165,0,.4);
  transition:all .2s; z-index:50;
}
.fab:hover { transform:scale(1.08); }
.fab:active { transform:scale(.95); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.8); backdrop-filter:blur(4px);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%; max-width:600px; max-height:92vh; overflow-y:auto;
  transform:translateY(40px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  padding-bottom:32px;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:38px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
.modal-header { padding:14px 18px 0; display:flex; justify-content:space-between; align-items:center; }
.modal-title { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; }
.modal-close { background:var(--surface2); border:none; color:var(--text2); width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.modal-close:hover { background:var(--surface3); color:var(--text); }
.modal-body { padding:14px 18px 0; }
.modal-section { padding:14px 18px 0; }

/* FORM */
.form-group { margin-bottom:13px; }
.form-label { display:block; font-size:11px; font-weight:500; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
.form-input,.form-select,.form-textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:10px 13px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; appearance:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); }
.form-select option { background:var(--surface2); }
.form-textarea { resize:none; min-height:76px; line-height:1.5; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.btn-primary {
  width:100%; background:var(--accent); border:none; border-radius:11px;
  padding:13px; color:#000; font-family:'Syne',sans-serif; font-weight:700; font-size:15px;
  cursor:pointer; transition:all .2s; margin-top:6px;
}
.btn-primary:hover { background:#ffb800; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-danger { width:100%; background:transparent; border:1px solid #ef4444; border-radius:11px; padding:11px; color:#ef4444; font-family:'DM Sans',sans-serif; font-weight:500; font-size:14px; cursor:pointer; transition:all .2s; margin-top:8px; }
.btn-danger:hover { background:rgba(239,68,68,.1); }

/* STAGE SELECTOR */
.stage-selector { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; margin-top:4px; }
.stage-option {
  padding:9px 6px; border-radius:9px; border:1.5px solid var(--border);
  background:transparent; color:var(--text2);
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
  cursor:pointer; transition:all .2s; text-align:center;
}
.stage-option.selected { border-color:var(--stage-color); background:var(--stage-color); color:#fff; font-weight:600; }
.stage-option.selected.won { color:#000; }

/* DETAIL */
.detail-hero { background:linear-gradient(135deg,var(--surface2),var(--surface3)); border-bottom:1px solid var(--border); padding:18px; }
.detail-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:3px; }
.detail-phone { font-size:13px; color:var(--text2); }
.detail-badges { display:flex; gap:7px; margin-top:10px; flex-wrap:wrap; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.info-block { background:var(--surface2); padding:11px; border-radius:9px; }
.info-block.full { grid-column:1/-1; }
.info-key { font-size:10px; color:var(--text3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.4px; }
.info-val { font-size:13px; font-weight:500; }
.section-label { font-family:'Syne',sans-serif; font-weight:700; font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:9px; padding-bottom:5px; border-bottom:1px solid var(--border); }

/* TIMELINE */
.timeline-item { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:12px; }
.timeline-item:last-child { border-bottom:none; }
.tl-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); margin-top:3px; flex-shrink:0; }
.tl-text { color:var(--text2); flex:1; line-height:1.5; }
.tl-time { color:var(--text3); font-size:11px; white-space:nowrap; }
.note-row { display:flex; gap:7px; margin-top:7px; }
.note-row .form-input { flex:1; }
.btn-sm { background:var(--accent); border:none; border-radius:9px; padding:9px 13px; color:#000; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; transition:all .2s; }
.btn-sm:hover { background:#ffb800; }

/* LOADING */
.loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:14px; transition:opacity .4s; }
.loading.hide { opacity:0; pointer-events:none; }
.spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-title { font-family:'Syne',sans-serif; font-weight:700; font-size:19px; }
.loading-sub { font-size:12px; color:var(--text3); }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--surface3); border:1px solid var(--border); border-radius:11px; padding:10px 18px; font-size:13px; font-weight:500; z-index:500; opacity:0; transition:all .3s; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.4); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { border-color:var(--stage-won); color:#86efac; }
.toast.error { border-color:#ef4444; color:#fca5a5; }
.toast.warn { border-color:#f59e0b; color:#fcd34d; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-title">Amar Furniture CRM</div>
  <div class="loading-sub" id="loadingSub">Starting up...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════════ AUTH SCREEN ══════════════════ -->
<div id="authScreen" style="display:none">
  <div class="auth-logo">
    <span>🛋</span> Amar <span>CRM</span>
  </div>
  <div class="auth-sub">Lead Management System</div>

  <div class="auth-card">
    <div class="auth-title" id="authTitle">Sign In</div>
    <div class="auth-error" id="authError"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="authEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="authPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="authBtn" onclick="handleAuth()">Sign In</button>

    <div style="text-align:center; margin-top:14px; font-size:13px; color:var(--text3)">
      <span id="authToggleText">Don't have an account?</span>
      <button onclick="toggleAuthMode()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;margin-left:4px" id="authToggleBtn">Register</button>
    </div>

    <div style="text-align:center; margin-top:8px;">
      <button onclick="handleForgotPassword()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px" id="forgotBtn">Forgot password?</button>
    </div>
  </div>
</div>

<!-- ══════════════════ APP SCREEN ══════════════════ -->
<div id="appScreen">

  <!-- HEADER -->
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>Amar <span>CRM</span></div>
    <div class="header-right">
      <button class="icon-btn" id="sortBtn" onclick="toggleSort()" title="Sort">↕</button>
      <button class="icon-btn" onclick="handleSignOut()" title="Sign out">⎋</button>
    </div>
  </div>

  <!-- OFFLINE BANNER -->
  <div class="offline-banner" id="offlineBanner">
    <span>📡 Offline mode</span>
    <span class="sync-badge" id="pendingCount">0 pending</span>
    <span>— will sync when connected</span>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-num" id="statActive" style="color:#3b82f6">0</div><div class="stat-label">Active</div></div>
    <div class="stat-item"><div class="stat-num" id="statWon" style="color:#22c55e">0</div><div class="stat-label">Won</div></div>
    <div class="stat-item"><div class="stat-num" id="statPipeline" style="color:var(--accent)">₹0</div><div class="stat-label">Pipeline</div></div>
  </div>

  <!-- FILTER STRIP -->
  <div class="filter-strip">
    <button class="filter-chip active" onclick="setFilter('ALL',this)">All</button>
    <button class="filter-chip" onclick="setFilter('New Lead',this)"><span class="chip-dot" style="background:var(--stage-new)"></span>New</button>
    <button class="filter-chip" onclick="setFilter('Contacted',this)"><span class="chip-dot" style="background:var(--stage-contacted)"></span>Contacted</button>
    <button class="filter-chip" onclick="setFilter('Site Visit / Meeting',this)"><span class="chip-dot" style="background:var(--stage-visit)"></span>Site Visit</button>
    <button class="filter-chip" onclick="setFilter('Quotation Sent',this)"><span class="chip-dot" style="background:var(--stage-quote)"></span>Quotation</button>
    <button class="filter-chip" onclick="setFilter('Negotiation',this)"><span class="chip-dot" style="background:var(--stage-nego)"></span>Negotiation</button>
    <button class="filter-chip" onclick="setFilter('Won → Order Created',this)"><span class="chip-dot" style="background:var(--stage-won)"></span>Won</button>
    <button class="filter-chip" onclick="setFilter('Lost / Cold',this)"><span class="chip-dot" style="background:var(--stage-lost)"></span>Lost</button>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search name, phone, location..." oninput="renderLeads()">
  </div>

  <!-- LEADS -->
  <div class="leads-list" id="leadsList"></div>

  <!-- FAB -->
  <button class="fab" onclick="openAddModal()">+</button>
</div>

<!-- ══ FORM MODAL ══ -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="formModalTitle">New Lead</div>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client Name *</label>
          <input type="text" class="form-input" id="fName" placeholder="Full name">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-input" id="fPhone" placeholder="10-digit">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Location / Area</label>
          <input type="text" class="form-input" id="fLocation" placeholder="e.g. Bhiwandi">
        </div>
        <div class="form-group">
          <label class="form-label">Lead Source</label>
          <select class="form-select" id="fSource">
            <option value="">Select</option>
            <option>WhatsApp / Phone call</option>
            <option>Walk-in / Site visit</option>
            <option>Builder / Contractor referral</option>
            <option>Social media / Online</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Requirement</label>
          <input type="text" class="form-input" id="fRequirement" placeholder="e.g. Bedroom set">
        </div>
        <div class="form-group">
          <label class="form-label">Est. Budget (₹)</label>
          <input type="number" class="form-input" id="fBudget" placeholder="75000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Stage</label>
        <select class="form-select" id="fStage">
          <option>New Lead</option>
          <option>Contacted</option>
          <option>Site Visit / Meeting</option>
          <option>Quotation Sent</option>
          <option>Negotiation</option>
          <option>Won → Order Created</option>
          <option>Lost / Cold</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="fNotes" placeholder="Any details about this lead..."></textarea>
      </div>
      <button class="btn-primary" id="formSubmitBtn" onclick="submitForm()">Save Lead</button>
    </div>
  </div>
</div>

<!-- ══ DETAIL MODAL ══ -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<!-- ══════════════════════════════════════════════════
     FIREBASE + APP LOGIC
══════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
         onSnapshot, serverTimestamp, orderBy, query, enableIndexedDbPersistence }
                                   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         sendPasswordResetEmail, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ── ⚠️  REPLACE WITH YOUR FIREBASE CONFIG ──────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCkgcclM2dOVB2qBPlN8OxJkEx5wmCG0IU",
  authDomain:        "amar-furniture-crm.firebaseapp.com",
  projectId:         "amar-furniture-crm",
  storageBucket:     "amar-furniture-crm.firebasestorage.app",
  messagingSenderId: "599972752142",
  appId:             "1:599972752142:web:ce39eccf43f8c645a6855f"
};
// ───────────────────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const COLL = "leads";

// Enable offline persistence (Firestore caches all data to IndexedDB)
enableIndexedDbPersistence(db).catch(err => {
  if (err.code === 'failed-precondition') console.warn('Multiple tabs open — offline persistence limited');
  else if (err.code === 'unimplemented') console.warn('Browser does not support offline persistence');
});

// ── STATE ──
window._leads      = [];
window._filter     = 'ALL';
window._sortAsc    = false;
window._editingId  = null;
window._offlineQ   = JSON.parse(localStorage.getItem('af-crm-offline-q') || '[]');
window._isOnline   = navigator.onLine;
let _unsubLeads    = null;
let _authMode      = 'signin'; // 'signin' | 'register'

const STAGE_COLORS = {
  'New Lead':              'var(--stage-new)',
  'Contacted':             'var(--stage-contacted)',
  'Site Visit / Meeting':  'var(--stage-visit)',
  'Quotation Sent':        'var(--stage-quote)',
  'Negotiation':           'var(--stage-nego)',
  'Won → Order Created':   'var(--stage-won)',
  'Lost / Cold':           'var(--stage-lost)',
};

// ── ONLINE / OFFLINE ──
function updateOnlineStatus() {
  window._isOnline = navigator.onLine;
  const banner = document.getElementById('offlineBanner');
  if (!navigator.onLine) {
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
    flushOfflineQueue();
  }
  updatePendingBadge();
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

function updatePendingBadge() {
  const q = window._offlineQ;
  document.getElementById('pendingCount').textContent = `${q.length} pending`;
}

function saveOfflineQ() {
  localStorage.setItem('af-crm-offline-q', JSON.stringify(window._offlineQ));
  updatePendingBadge();
}

// ── FLUSH OFFLINE QUEUE ──
async function flushOfflineQueue() {
  if (!window._isOnline || window._offlineQ.length === 0) return;
  const q = [...window._offlineQ];
  window._offlineQ = [];
  saveOfflineQ();

  for (const op of q) {
    try {
      if (op.type === 'add') {
        await addDoc(collection(db, COLL), { ...op.data, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      } else if (op.type === 'update') {
        await updateDoc(doc(db, COLL, op.id), { ...op.data, updatedAt: serverTimestamp() });
      } else if (op.type === 'delete') {
        await deleteDoc(doc(db, COLL, op.id));
      }
    } catch(e) {
      console.error('Sync failed for op', op, e);
      window._offlineQ.push(op); // re-queue failed
    }
  }
  saveOfflineQ();
  if (q.length > 0) showToast(`✓ ${q.length} change(s) synced`, 'success');
}

// ── SW MESSAGE: flush on SW sync event ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'FLUSH_OFFLINE_QUEUE') flushOfflineQueue();
  });
}

// ── AUTH STATE ──
document.getElementById('loadingSub').textContent = 'Checking auth...';

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('visible');
    startLeadsListener();
    updateOnlineStatus();
  } else {
    if (_unsubLeads) { _unsubLeads(); _unsubLeads = null; }
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').classList.remove('visible');
    document.getElementById('loading').classList.add('hide');
  }
});

// ── LEADS LISTENER ──
function startLeadsListener() {
  if (_unsubLeads) return;
  const q = query(collection(db, COLL), orderBy('createdAt', 'desc'));
  _unsubLeads = onSnapshot(q, snap => {
    window._leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderLeads();
    updateStats();
    document.getElementById('loading').classList.add('hide');
  }, err => {
    // Offline — Firestore still serves from cache, no action needed
    console.log('Snapshot error (likely offline):', err.code);
    document.getElementById('loading').classList.add('hide');
  });
}

// ── AUTH HANDLERS ──
window.toggleAuthMode = function() {
  _authMode = _authMode === 'signin' ? 'register' : 'signin';
  const isReg = _authMode === 'register';
  document.getElementById('authTitle').textContent    = isReg ? 'Create Account' : 'Sign In';
  document.getElementById('authBtn').textContent      = isReg ? 'Register' : 'Sign In';
  document.getElementById('authToggleText').textContent = isReg ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('authToggleBtn').textContent  = isReg ? 'Sign In' : 'Register';
  document.getElementById('forgotBtn').style.display   = isReg ? 'none' : '';
  document.getElementById('authError').classList.remove('show');
}

window.handleAuth = async function() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn      = document.getElementById('authBtn');
  const errEl    = document.getElementById('authError');

  if (!email || !password) { showAuthError('Please enter email and password'); return; }

  btn.disabled = true;
  btn.textContent = _authMode === 'register' ? 'Creating account...' : 'Signing in...';
  errEl.classList.remove('show');

  try {
    if (_authMode === 'register') {
      await createUserWithEmailAndPassword(auth, email, password);
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found':     'No account found with this email',
      'auth/wrong-password':     'Incorrect password',
      'auth/email-already-in-use': 'Email already registered — sign in instead',
      'auth/weak-password':      'Password must be at least 6 characters',
      'auth/invalid-email':      'Please enter a valid email address',
      'auth/invalid-credential': 'Incorrect email or password',
      'auth/network-request-failed': 'No internet connection',
    };
    showAuthError(msgs[e.code] || e.message);
    btn.disabled = false;
    btn.textContent = _authMode === 'register' ? 'Register' : 'Sign In';
  }
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
}

window.handleForgotPassword = async function() {
  const email = document.getElementById('authEmail').value.trim();
  if (!email) { showAuthError('Enter your email above first'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showAuthError('');
    document.getElementById('authError').style.background = 'rgba(34,197,94,.1)';
    document.getElementById('authError').style.borderColor = 'rgba(34,197,94,.3)';
    document.getElementById('authError').style.color = '#86efac';
    document.getElementById('authError').textContent = 'Password reset email sent!';
    document.getElementById('authError').classList.add('show');
  } catch(e) { showAuthError(e.message); }
}

window.handleSignOut = async function() {
  if (!confirm('Sign out?')) return;
  await signOut(auth);
  showToast('Signed out');
}

// ── RENDER ──
window.renderLeads = function() {
  const list   = document.getElementById('leadsList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const stage  = window._filter;

  let leads = window._leads.filter(l => {
    const mStage  = stage === 'ALL' || l.stage === stage;
    const mSearch = !search || [l.name,l.phone,l.location,l.requirement].some(v => (v||'').toLowerCase().includes(search));
    return mStage && mSearch;
  });

  if (window._sortAsc) leads = [...leads].reverse();

  if (!leads.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No leads found</div>
      <div class="empty-sub">${stage !== 'ALL' ? 'No leads in this stage yet' : 'Tap + to add your first lead'}</div>
    </div>`;
    return;
  }

  list.innerHTML = leads.map(lead => {
    const color   = STAGE_COLORS[lead.stage] || 'var(--accent)';
    const isWon   = lead.stage === 'Won → Order Created';
    const date    = lead.createdAt?.toDate
      ? lead.createdAt.toDate().toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'2-digit'})
      : '—';
    const budget  = lead.budget ? `₹${Number(lead.budget).toLocaleString('en-IN')}` : null;
    const pending = (window._offlineQ || []).some(o => o.id === lead.id || o.tempId === lead.id);

    return `<div class="lead-card" style="--stage-color:${color}" onclick="openDetail('${lead.id}')">
      <div class="lead-top">
        <div>
          <div class="lead-name">${esc(lead.name)}</div>
          <div class="lead-phone">${esc(lead.phone||'—')}</div>
        </div>
        <span class="stage-badge${isWon?' won':''}" style="background:${color}">${lead.stage}</span>
      </div>
      <div class="lead-meta">
        ${lead.location   ? `<span class="meta-tag">📍 ${esc(lead.location)}</span>`   : ''}
        ${lead.source     ? `<span class="meta-tag">🔗 ${esc(lead.source)}</span>`     : ''}
        ${lead.requirement? `<span class="meta-tag">🛋 ${esc(lead.requirement)}</span>`: ''}
        ${budget          ? `<span class="meta-tag">💰 ${budget}</span>`              : ''}
      </div>
      ${lead.notes ? `<div class="lead-note">${esc(lead.notes)}</div>` : ''}
      <div class="lead-footer">
        <span class="lead-date">${date}</span>
        ${pending ? '<span class="offline-dot" title="Pending sync"></span>' : ''}
      </div>
    </div>`;
  }).join('');
}

window.updateStats = function() {
  const leads    = window._leads;
  const active   = leads.filter(l => !['Won → Order Created','Lost / Cold'].includes(l.stage));
  const won      = leads.filter(l => l.stage === 'Won → Order Created');
  const pipeline = leads.filter(l => l.stage !== 'Lost / Cold').reduce((s,l) => s+(Number(l.budget)||0), 0);
  document.getElementById('statTotal').textContent    = leads.length;
  document.getElementById('statActive').textContent   = active.length;
  document.getElementById('statWon').textContent      = won.length;
  const p = pipeline >= 100000 ? `₹${(pipeline/100000).toFixed(1)}L` : pipeline >= 1000 ? `₹${(pipeline/1000).toFixed(0)}K` : `₹${pipeline}`;
  document.getElementById('statPipeline').textContent = p;
}

// ── FILTER / SORT ──
window.setFilter = function(stage, el) {
  window._filter = stage;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderLeads();
}
window.toggleSort = function() {
  window._sortAsc = !window._sortAsc;
  document.getElementById('sortBtn').textContent = window._sortAsc ? '↑' : '↕';
  renderLeads();
}

// ── MODAL HELPERS ──
window.openModal  = id => document.getElementById(id).classList.add('open');
window.closeModal = id => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);

// ── ADD / EDIT FORM ──
window.openAddModal = function() {
  window._editingId = null;
  document.getElementById('formModalTitle').textContent = 'New Lead';
  document.getElementById('formSubmitBtn').textContent  = 'Save Lead';
  ['fName','fPhone','fLocation','fRequirement','fBudget','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fSource').value = '';
  document.getElementById('fStage').value  = 'New Lead';
  openModal('formModal');
  setTimeout(() => document.getElementById('fName').focus(), 300);
}

window.openEditModal = function(id) {
  const lead = window._leads.find(l => l.id === id);
  if (!lead) return;
  window._editingId = id;
  document.getElementById('formModalTitle').textContent = 'Edit Lead';
  document.getElementById('formSubmitBtn').textContent  = 'Update Lead';
  document.getElementById('fName').value        = lead.name        || '';
  document.getElementById('fPhone').value       = lead.phone       || '';
  document.getElementById('fLocation').value    = lead.location    || '';
  document.getElementById('fSource').value      = lead.source      || '';
  document.getElementById('fRequirement').value = lead.requirement || '';
  document.getElementById('fBudget').value      = lead.budget      || '';
  document.getElementById('fStage').value       = lead.stage       || 'New Lead';
  document.getElementById('fNotes').value       = lead.notes       || '';
  closeModal('detailModal');
  openModal('formModal');
}

window.submitForm = async function() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Client name is required', 'error'); return; }

  const btn = document.getElementById('formSubmitBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const data = {
    name,
    phone:       document.getElementById('fPhone').value.trim(),
    location:    document.getElementById('fLocation').value.trim(),
    source:      document.getElementById('fSource').value,
    requirement: document.getElementById('fRequirement').value.trim(),
    budget:      document.getElementById('fBudget').value,
    stage:       document.getElementById('fStage').value,
    notes:       document.getElementById('fNotes').value.trim(),
  };

  try {
    if (window._editingId) {
      if (window._isOnline) {
        await updateDoc(doc(db, COLL, window._editingId), { ...data, updatedAt: serverTimestamp() });
      } else {
        // Optimistic local update + queue
        const idx = window._leads.findIndex(l => l.id === window._editingId);
        if (idx > -1) window._leads[idx] = { ...window._leads[idx], ...data };
        window._offlineQ.push({ type:'update', id: window._editingId, data });
        saveOfflineQ();
        renderLeads(); updateStats();
        showToast('Saved locally — will sync when online', 'warn');
      }
      showToast('Lead updated ✓', 'success');
    } else {
      if (window._isOnline) {
        await addDoc(collection(db, COLL), { ...data, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), timeline: [] });
      } else {
        const tempId = 'offline_' + Date.now();
        window._leads.unshift({ id: tempId, ...data, createdAt: null, timeline: [] });
        window._offlineQ.push({ type:'add', tempId, data: { ...data, timeline: [] } });
        saveOfflineQ();
        renderLeads(); updateStats();
        showToast('Saved locally — will sync when online', 'warn');
      }
      showToast('Lead added ✓', 'success');
    }
    closeModal('formModal');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = window._editingId ? 'Update Lead' : 'Save Lead';
}

// ── UPDATE STAGE ──
window.updateStage = async function(id, stage) {
  try {
    if (window._isOnline) {
      await updateDoc(doc(db, COLL, id), { stage, updatedAt: serverTimestamp() });
    } else {
      const idx = window._leads.findIndex(l => l.id === id);
      if (idx > -1) window._leads[idx].stage = stage;
      window._offlineQ.push({ type:'update', id, data: { stage } });
      saveOfflineQ();
      renderLeads(); updateStats();
    }
    showToast(`Stage → ${stage}`, 'success');
    setTimeout(() => openDetail(id), 200);
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ── ADD NOTE ──
window.addNote = async function(id) {
  const input = document.getElementById('noteInput');
  const text  = (input.value || '').trim();
  if (!text) return;

  const lead     = window._leads.find(l => l.id === id);
  const timeline = [...(lead.timeline || [])];
  timeline.unshift({ text, time: new Date().toISOString() });

  try {
    if (window._isOnline) {
      await updateDoc(doc(db, COLL, id), { timeline, updatedAt: serverTimestamp() });
    } else {
      const idx = window._leads.findIndex(l => l.id === id);
      if (idx > -1) window._leads[idx].timeline = timeline;
      window._offlineQ.push({ type:'update', id, data: { timeline } });
      saveOfflineQ();
    }
    input.value = '';
    showToast('Note added', 'success');
    setTimeout(() => openDetail(id), 200);
  } catch(e) { showToast('Error', 'error'); }
}

// ── DELETE ──
window.deleteLead = async function(id) {
  if (!confirm('Delete this lead? Cannot be undone.')) return;
  try {
    if (window._isOnline) {
      await deleteDoc(doc(db, COLL, id));
    } else {
      window._leads = window._leads.filter(l => l.id !== id);
      window._offlineQ.push({ type:'delete', id });
      saveOfflineQ();
      renderLeads(); updateStats();
    }
    closeModal('detailModal');
    showToast('Lead deleted');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ── DETAIL VIEW ──
window.openDetail = function(id) {
  const lead = window._leads.find(l => l.id === id);
  if (!lead) return;
  const color  = STAGE_COLORS[lead.stage] || 'var(--accent)';
  const isWon  = lead.stage === 'Won → Order Created';
  const budget = lead.budget ? `₹${Number(lead.budget).toLocaleString('en-IN')}` : 'Not set';
  const date   = lead.createdAt?.toDate
    ? lead.createdAt.toDate().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})
    : 'Offline entry';

  const STAGES = ['New Lead','Contacted','Site Visit / Meeting','Quotation Sent','Negotiation','Won → Order Created','Lost / Cold'];
  const stagesHTML = STAGES.map(s => {
    const sc = STAGE_COLORS[s];
    const isW = s === 'Won → Order Created';
    const sel = lead.stage === s;
    return `<button class="stage-option${sel ? ' selected'+(isW?' won':'') : ''}"
      style="--stage-color:${sc}" onclick="updateStage('${id}','${s.replace(/'/g,"\\'")}')">${s}</button>`;
  }).join('');

  const tlHTML = (lead.timeline||[]).map(t => {
    const d   = new Date(t.time);
    const rel = d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    return `<div class="timeline-item"><div class="tl-dot"></div><div class="tl-text">${esc(t.text)}</div><div class="tl-time">${rel}</div></div>`;
  }).join('') || `<div style="font-size:12px;color:var(--text3);padding:8px 0">No activity yet</div>`;

  document.getElementById('detailContent').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Lead Details</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="detail-hero">
      <div class="detail-name">${esc(lead.name)}</div>
      <div class="detail-phone">${esc(lead.phone||'—')}</div>
      <div class="detail-badges">
        <span class="stage-badge${isWon?' won':''}" style="background:${color}">${lead.stage}</span>
        ${lead.source ? `<span class="meta-tag" style="font-size:11px">🔗 ${esc(lead.source)}</span>` : ''}
      </div>
    </div>

    <div class="modal-section">
      <div class="info-grid">
        <div class="info-block"><div class="info-key">Location</div><div class="info-val">${esc(lead.location||'—')}</div></div>
        <div class="info-block"><div class="info-key">Budget</div><div class="info-val" style="color:var(--accent)">${budget}</div></div>
        <div class="info-block full"><div class="info-key">Requirement</div><div class="info-val">${esc(lead.requirement||'—')}</div></div>
        ${lead.notes ? `<div class="info-block full"><div class="info-key">Notes</div><div class="info-val" style="line-height:1.6;color:var(--text2)">${esc(lead.notes)}</div></div>` : ''}
        <div class="info-block full"><div class="info-key">Added</div><div class="info-val" style="color:var(--text2)">${date}</div></div>
      </div>
    </div>

    <div class="modal-section" style="margin-top:14px">
      <div class="section-label">Update Stage</div>
      <div class="stage-selector">${stagesHTML}</div>
    </div>

    <div class="modal-section" style="margin-top:14px">
      <div class="section-label">Activity</div>
      <div class="note-row">
        <input type="text" class="form-input" id="noteInput" placeholder="Add activity note..." style="font-size:13px">
        <button class="btn-sm" onclick="addNote('${id}')">Add</button>
      </div>
      <div style="margin-top:10px">${tlHTML}</div>
    </div>

    <div class="modal-section" style="margin-top:6px">
      <button class="btn-primary" onclick="openEditModal('${id}')">✏️ Edit Lead</button>
      <button class="btn-danger" onclick="deleteLead('${id}')">Delete Lead</button>
    </div>
  `;
  openModal('detailModal');
}

// ── UTILS ──
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.showToast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── ENTER KEY on auth ──
['authEmail','authPassword'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') window.handleAuth(); });
});

// ── SERVICE WORKER REGISTRATION ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
